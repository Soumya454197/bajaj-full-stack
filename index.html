<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFHL — Node Hierarchy Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --surface: #f8f8f8; --surface2: #f0f0f0;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.15);
      --text: #1a1a1a; --muted: #666666;
      --accent: #7c6df0; --accent2: #6b5bdb;
      --green: #2eab71; --red: #e53e3e; --amber: #ed8936;
      --mono: 'JetBrains Mono', monospace; --sans: 'Syne', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

    header {
      border-bottom: 1px solid var(--border); padding: 1.1rem 2rem;
      display: flex; align-items: center; gap: 12px; background: var(--surface);
    }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    header h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
    header .sub { font-size: 12px; color: var(--muted); margin-left: auto; font-family: var(--mono); }

    main { max-width: 920px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    .input-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .field-label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block; }

    .api-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
    .api-row input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-family: var(--mono);
      font-size: 12px; padding: 8px 12px; outline: none; transition: border-color 0.2s;
    }
    .api-row input:focus { border-color: var(--accent); }

    textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: var(--mono);
      font-size: 13px; padding: 12px 14px; resize: vertical; min-height: 110px;
      line-height: 1.7; outline: none; transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }
    .hint { font-size: 12px; color: var(--muted); margin-top: 7px; font-family: var(--mono); }

    .btn-row { display: flex; gap: 10px; margin-top: 1rem; align-items: center; }
    button { font-family: var(--sans); font-size: 13px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; padding: 10px 22px; transition: all 0.18s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-clear { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-clear:hover { color: var(--text); border-color: var(--border2); }

    .spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.12); border-top-color: #fff; border-radius: 50%; animation: spin 0.65s linear infinite; margin-right: 7px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box { background: rgba(245,101,101,0.08); border: 1px solid rgba(245,101,101,0.3); border-radius: 8px; padding: 12px 16px; color: #fc8181; font-size: 13px; margin-bottom: 1.5rem; font-family: var(--mono); display: none; }
    .error-box.show { display: block; }

    #result { display: none; }
    #result.show { display: block; }

    .sec-title { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.9rem; }

    .identity-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
    .chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-family: var(--mono); font-size: 12px; }
    .chip span { color: var(--muted); margin-right: 5px; }

    .summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.75rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .stat-val { font-size: 30px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .s-trees .stat-val { color: var(--green); }
    .s-cycles .stat-val { color: var(--red); }
    .s-root .stat-val { color: var(--accent2); font-family: var(--mono); }

    .tree-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 12px; margin-bottom: 1.75rem; }
    .tree-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .tree-card.cyclic { border-color: rgba(245,101,101,0.28); }
    .tree-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface2); }
    .root-lbl { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--accent2); }
    .badge { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
    .b-depth { background: rgba(124,109,240,0.18); color: var(--accent2); }
    .b-cycle { background: rgba(245,101,101,0.14); color: #fc8181; }
    .tree-body { padding: 12px 14px; font-family: var(--mono); font-size: 12px; line-height: 1.9; min-height: 52px; }
    .tree-line { display: flex; align-items: baseline; gap: 4px; }
    .tree-line .ind { color: rgba(255,255,255,0.18); user-select: none; }
    .tree-line .node { color: var(--text); }

    .pills-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 1.75rem; }
    .pill { padding: 5px 11px; border-radius: 5px; font-family: var(--mono); font-size: 12px; }
    .pill-inv { background: rgba(246,173,85,0.12); color: var(--amber); border: 1px solid rgba(246,173,85,0.22); }
    .pill-dup { background: rgba(124,109,240,0.12); color: var(--accent2); border: 1px solid rgba(124,109,240,0.22); }
    .empty-note { font-size: 12px; color: var(--muted); font-family: var(--mono); }

    .raw-toggle { background: none; border: none; color: var(--muted); font-size: 12px; font-family: var(--mono); cursor: pointer; padding: 0; text-decoration: underline; }
    .raw-toggle:hover { color: var(--text); }
    .raw-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-family: var(--mono); font-size: 12px; line-height: 1.7; color: var(--muted); white-space: pre-wrap; word-break: break-all; margin-top: 10px; display: none; max-height: 320px; overflow-y: auto; }
    .raw-box.show { display: block; }

    @media (max-width: 600px) {
      main { padding: 1.5rem 1rem; }
      .summary-bar { grid-template-columns: 1fr 1fr; }
      .api-row { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>BFHL Explorer</h1>
  <span class="sub">POST /bfhl</span>
</header>

<main>

  <!-- Input Card -->
  <div class="input-card">
    <div class="api-row">
      <label class="field-label" style="white-space:nowrap; margin-bottom:0;">API URL</label>
      <input type="text" id="apiUrl" placeholder="https://your-api.vercel.app" value="http://localhost:3000" />
    </div>

    <label class="field-label">Node Input</label>
    <textarea id="nodeInput" placeholder="Enter nodes separated by commas or new lines&#10;e.g. A->B, A->C, B->D, X->Y, Y->Z, Z->X"></textarea>
    <p class="hint">// separate by commas or newlines &nbsp;·&nbsp; Ctrl+Enter to submit</p>

    <div class="btn-row">
      <button class="btn-primary" id="submitBtn" onclick="callApi()">Submit</button>
      <button class="btn-clear" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Result -->
  <div id="result">

    <p class="sec-title">Identity</p>
    <div class="identity-strip" id="identityStrip"></div>

    <p class="sec-title">Summary</p>
    <div class="summary-bar" id="summaryBar"></div>

    <p class="sec-title">Hierarchies</p>
    <div class="tree-grid" id="treeGrid"></div>

    <p class="sec-title">Invalid Entries</p>
    <div class="pills-row" id="invalidPills"></div>

    <p class="sec-title">Duplicate Edges</p>
    <div class="pills-row" id="dupPills"></div>

    <p class="sec-title">
      Raw Response &nbsp;
      <button class="raw-toggle" onclick="toggleRaw()">show / hide</button>
    </p>
    <div class="raw-box" id="rawBox"></div>

  </div>
</main>

<script>
  async function callApi() {
    const apiUrl = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
    const raw = document.getElementById('nodeInput').value;
    const btn = document.getElementById('submitBtn');
    const errBox = document.getElementById('errorBox');
    const result = document.getElementById('result');

    if (!raw.trim()) { showError('Please enter at least one node string.'); return; }
    if (!apiUrl) { showError('Please enter your API URL above.'); return; }

    // Parse: split by comma or newline, trim each entry
    const data = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

    errBox.classList.remove('show');
    result.classList.remove('show');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Sending...';

    try {
      const res = await fetch(apiUrl + '/bfhl', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data })
      });

      const json = await res.json();

      if (!res.ok) {
        showError('API returned ' + res.status + ': ' + (json.message || JSON.stringify(json)));
        return;
      }

      renderResult(json);

    } catch (e) {
      showError('Could not reach API — ' + e.message + '. Check the URL and make sure CORS is enabled on your server.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Submit';
    }
  }

  function renderResult(d) {
    // Identity chips
    document.getElementById('identityStrip').innerHTML = [
      ['user_id', d.user_id],
      ['email', d.email_id],
      ['roll no', d.college_roll_number]
    ].map(([k, v]) =>
      '<div class="chip"><span>' + k + '</span>' + esc(v ?? '—') + '</div>'
    ).join('');

    // Summary stats
    const s = d.summary || {};
    document.getElementById('summaryBar').innerHTML =
      '<div class="stat-card s-trees"><div class="stat-val">' + (s.total_trees ?? 0) + '</div><div class="stat-label">Valid Trees</div></div>' +
      '<div class="stat-card s-cycles"><div class="stat-val">' + (s.total_cycles ?? 0) + '</div><div class="stat-label">Cycles</div></div>' +
      '<div class="stat-card s-root"><div class="stat-val">' + esc(s.largest_tree_root ?? '—') + '</div><div class="stat-label">Largest Root</div></div>';

    // Hierarchies
    const hierarchies = d.hierarchies || [];
    document.getElementById('treeGrid').innerHTML = hierarchies.length
      ? hierarchies.map(buildTreeCard).join('')
      : '<p class="empty-note">// no hierarchies returned</p>';

    // Invalid entries
    const inv = d.invalid_entries || [];
    document.getElementById('invalidPills').innerHTML = inv.length
      ? inv.map(e => '<span class="pill pill-inv">' + esc(e) + '</span>').join('')
      : '<span class="empty-note">// none</span>';

    // Duplicate edges
    const dup = d.duplicate_edges || [];
    document.getElementById('dupPills').innerHTML = dup.length
      ? dup.map(e => '<span class="pill pill-dup">' + esc(e) + '</span>').join('')
      : '<span class="empty-note">// none</span>';

    // Raw JSON
    document.getElementById('rawBox').textContent = JSON.stringify(d, null, 2);

    document.getElementById('result').classList.add('show');
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function buildTreeCard(h) {
    const isCycle = !!h.has_cycle;
    const badge = isCycle
      ? '<span class="badge b-cycle">Cycle</span>'
      : '<span class="badge b-depth">depth ' + h.depth + '</span>';

    const treeHtml = isCycle
      ? '<span style="color:var(--red);font-size:11px">cyclic — no tree structure</span>'
      : renderLines(h.tree, 0);

    return '<div class="tree-card ' + (isCycle ? 'cyclic' : '') + '">' +
      '<div class="tree-head"><span class="root-lbl">Root: ' + esc(h.root) + '</span>' + badge + '</div>' +
      '<div class="tree-body">' + treeHtml + '</div>' +
      '</div>';
  }

  function renderLines(obj, depth) {
    if (!obj || typeof obj !== 'object') return '';
    let html = '';
    const entries = Object.entries(obj);
    entries.forEach(([key, children], i) => {
      const isLast = i === entries.length - 1;
      const pad = depth === 0 ? '' : ('&nbsp;&nbsp;'.repeat(depth));
      const prefix = depth === 0 ? '' : (isLast ? '└─ ' : '├─ ');
      html += '<div class="tree-line"><span class="ind">' + pad + prefix + '</span><span class="node">' + esc(key) + '</span></div>';
      html += renderLines(children, depth + 1);
    });
    return html;
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = '✗  ' + msg;
    box.classList.add('show');
  }

  function clearAll() {
    document.getElementById('nodeInput').value = '';
    document.getElementById('errorBox').classList.remove('show');
    document.getElementById('result').classList.remove('show');
  }

  function toggleRaw() {
    document.getElementById('rawBox').classList.toggle('show');
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('nodeInput').addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'Enter') callApi();
    });
  });
</script>

</body>
</html>
